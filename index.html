<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CSS Visual Generator — Premium tool for generating CSS gradients, shadows, filters, glassmorphism, neumorphism and more. Real-time preview with one-click copy." />
    <title>CSS Visual Generator — Gradient, Shadow, Filter & More</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      // Blocking script to prevent FOUC (flash of unstyled content)
      // Reads theme from localStorage before React mounts
      (function() {
        var theme = localStorage.getItem('css-gen-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
